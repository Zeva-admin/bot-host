<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 336" width="100%" max-width="300px">
  <defs>
    <g id="diamond"><path d="M 0 -25 L 18 0 L 0 25 L -18 0 Z" fill="#d40000" /></g>
    <g id="small-diamond"><use href="#diamond" transform="scale(0.42)" y="-2" /></g>
    <g id="index"><text x="26" y="42" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#d40000" text-anchor="middle">K</text><use href="#small-diamond" x="26" y="64" /></g>
    <g id="king-half">
      <!-- Одежда (красная с синим) -->
      <rect x="44" y="44" width="152" height="124" fill="#d40000" />
      <path d="M 120 44 L 196 44 L 196 168 L 120 168 Z" fill="#0055aa" />
      <!-- Лицо с бородой -->
      <rect x="105" y="70" width="30" height="40" fill="#ffe0bd" stroke="#000" stroke-width="1.5" />
      <path d="M100 85 L 120 120 L 140 85 L 135 110 L 105 110 Z" fill="#ddd" /> <!-- Седая борода -->
      <!-- Корона -->
      <path d="M95 70 L 90 44 L 105 56 L 120 44 L 135 56 L 150 44 L 145 70 Z" fill="#ffd700" stroke="#000" stroke-width="1.5" />
      <!-- Меч/Скипетр -->
      <rect x="64" y="44" width="12" height="124" fill="#333" stroke="#000" stroke-width="1.5" />
      <rect x="54" y="130" width="32" height="10" fill="#ffd700" stroke="#000" stroke-width="1.5" />
      <use href="#small-diamond" x="156" y="110" />
    </g>
  </defs>
  <rect x="1" y="1" width="238" height="334" rx="14" ry="14" fill="#ffffff" stroke="#000000" stroke-width="1.5" />
  <use href="#index" />
  <use href="#index" transform="rotate(180 120 168)" />
  <rect x="44" y="44" width="152" height="248" fill="none" stroke="#000000" stroke-width="2" />
  <use href="#king-half" />
  <use href="#king-half" transform="rotate(180 120 168)" />
</svg>