<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 336" width="100%" max-width="300px">
  <defs>
    <g id="heart"><path d="M0 -10 C 15 -25, 28 -12, 28 2 C 28 15, 8 22, 0 30 C -8 22, -28 15, -28 2 C -28 -12, -15 -25, 0 -10 Z" fill="#d40000" /></g>
    <g id="small-heart"><use href="#heart" transform="scale(0.42)" y="-4" /></g>
    <g id="index"><text x="26" y="42" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#d40000" text-anchor="middle">Q</text><use href="#small-heart" x="26" y="64" /></g>
    <g id="queen-half">
      <rect x="44" y="44" width="152" height="124" fill="#d40000" />
      <path d="M196 44 L 44 168 L 196 168 Z" fill="#000" />
      <!-- Лицо и волосы -->
      <path d="M105 70 L 135 70 L 130 110 L 110 110 Z" fill="#ffe0bd" stroke="#000" stroke-width="1.5" />
      <path d="M100 70 L 105 110 L 110 110 L 105 70 M 140 70 L 135 110 L 130 110 L 135 70" fill="#ffd700" />
      <!-- Корона -->
      <path d="M100 70 L 105 44 L 120 60 L 135 44 L 140 70 Z" fill="#ffd700" stroke="#000" stroke-width="1.5" />
      <!-- Цветок в руке -->
      <path d="M70 168 L 70 100" stroke="#000" stroke-width="4" />
      <circle cx="70" cy="100" r="12" fill="#ffd700" />
      <circle cx="70" cy="100" r="4" fill="#d40000" />
      <use href="#small-heart" x="156" y="125" />
    </g>
  </defs>
  <rect x="1" y="1" width="238" height="334" rx="14" ry="14" fill="#ffffff" stroke="#000000" stroke-width="1.5" />
  <use href="#index" />
  <use href="#index" transform="rotate(180 120 168)" />
  <rect x="44" y="44" width="152" height="248" fill="none" stroke="#000000" stroke-width="2" />
  <use href="#queen-half" />
  <use href="#queen-half" transform="rotate(180 120 168)" />
</svg>