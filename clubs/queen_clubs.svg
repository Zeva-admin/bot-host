<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 336" width="100%" max-width="300px">
  <defs>
    <g id="club">
      <path d="M 0 -5 C 2 -5 5 15 8 18 L -8 18 C -5 15 -2 -5 0 -5 Z" fill="#000000" />
      <circle cx="0" cy="-13" r="9" fill="#000000" />
      <circle cx="-11" cy="2" r="9" fill="#000000" />
      <circle cx="11" cy="2" r="9" fill="#000000" />
      <circle cx="0" cy="-2" r="5" fill="#000000" />
    </g>
    <g id="small-club"><use href="#club" transform="scale(0.42)" y="-2" /></g>
    <g id="index"><text x="26" y="42" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#000000" text-anchor="middle">Q</text><use href="#small-club" x="26" y="64" /></g>
    <g id="queen-half">
      <!-- Одежда (золотая с зеленым) -->
      <rect x="44" y="44" width="152" height="124" fill="#ffd700" />
      <path d="M196 44 L 44 168 L 196 168 Z" fill="#006633" />
      <!-- Лицо -->
      <path d="M105 70 L 135 70 L 130 110 L 110 110 Z" fill="#ffe0bd" stroke="#000" stroke-width="1.5" />
      <path d="M100 70 L 105 110 L 110 110 L 105 70 M 140 70 L 135 110 L 130 110 L 135 70" fill="#222" />
      <!-- Корона -->
      <path d="M100 70 L 105 44 L 120 60 L 135 44 L 140 70 Z" fill="#d40000" stroke="#000" stroke-width="1.5" />
      <!-- Белый цветок -->
      <path d="M70 168 L 70 100" stroke="#000" stroke-width="4" />
      <circle cx="70" cy="100" r="12" fill="#ffffff" stroke="#000000" stroke-width="1.5" />
      <circle cx="70" cy="100" r="4" fill="#d40000" />
      <use href="#small-club" x="156" y="125" />
    </g>
  </defs>
  <rect x="1" y="1" width="238" height="334" rx="14" ry="14" fill="#ffffff" stroke="#000000" stroke-width="1.5" />
  <use href="#index" />
  <use href="#index" transform="rotate(180 120 168)" />
  <rect x="44" y="44" width="152" height="248" fill="none" stroke="#000000" stroke-width="2" />
  <use href="#queen-half" />
  <use href="#queen-half" transform="rotate(180 120 168)" />
</svg>