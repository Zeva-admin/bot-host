<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 336" width="100%" max-width="300px">
  <defs>
    <g id="club">
      <path d="M 0 -5 C 2 -5 5 15 8 18 L -8 18 C -5 15 -2 -5 0 -5 Z" fill="#000000" />
      <circle cx="0" cy="-13" r="9" fill="#000000" />
      <circle cx="-11" cy="2" r="9" fill="#000000" />
      <circle cx="11" cy="2" r="9" fill="#000000" />
      <circle cx="0" cy="-2" r="5" fill="#000000" />
    </g>
    <g id="small-club"><use href="#club" transform="scale(0.42)" y="-2" /></g>
    <g id="index"><text x="26" y="42" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#000000" text-anchor="middle">K</text><use href="#small-club" x="26" y="64" /></g>
    <g id="king-half">
      <!-- Одежда (зеленая с красным) -->
      <rect x="44" y="44" width="152" height="124" fill="#006633" />
      <path d="M 120 44 L 196 44 L 196 168 L 120 168 Z" fill="#d40000" />
      <!-- Лицо с черной бородой -->
      <rect x="105" y="70" width="30" height="40" fill="#ffe0bd" stroke="#000" stroke-width="1.5" />
      <path d="M100 85 L 120 120 L 140 85 L 135 110 L 105 110 Z" fill="#222" /> 
      <!-- Золотая корона -->
      <path d="M95 70 L 90 44 L 105 56 L 120 44 L 135 56 L 150 44 L 145 70 Z" fill="#ffd700" stroke="#000" stroke-width="1.5" />
      <!-- Держава (Сфера с крестом) -->
      <circle cx="70" cy="90" r="15" fill="#ffd700" stroke="#000" stroke-width="1.5" />
      <path d="M70 75 L 70 65 M 65 70 L 75 70" stroke="#000" stroke-width="2" />
      <use href="#small-club" x="156" y="110" />
    </g>
  </defs>
  <rect x="1" y="1" width="238" height="334" rx="14" ry="14" fill="#ffffff" stroke="#000000" stroke-width="1.5" />
  <use href="#index" />
  <use href="#index" transform="rotate(180 120 168)" />
  <rect x="44" y="44" width="152" height="248" fill="none" stroke="#000000" stroke-width="2" />
  <use href="#king-half" />
  <use href="#king-half" transform="rotate(180 120 168)" />
</svg>